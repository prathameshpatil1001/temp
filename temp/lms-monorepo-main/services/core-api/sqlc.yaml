version: "2"

sql:
  - engine: "postgresql"
    schema: "internal/repository/migrations/"
    queries: "internal/repository/queries/"
    gen:
      go:
        package: "generated"
        out: "internal/repository/generated"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        emit_prepared_queries: false
