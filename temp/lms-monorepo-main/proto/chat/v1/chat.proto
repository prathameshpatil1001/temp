syntax = "proto3";

package chat.v1;

option go_package = "github.com/chirag3003/lms-monorepo/services/core-api/internal/transport/grpc/generated/chatv1;chatv1";

service ChatService {
  // Returns users with whom caller can create a new direct room right now.
  rpc ListChatEligibleUsers(ListChatEligibleUsersRequest) returns (ListChatEligibleUsersResponse);
  // Idempotent by user pair: returns existing room if already present.
  rpc CreateOrGetDirectRoom(CreateOrGetDirectRoomRequest) returns (CreateOrGetDirectRoomResponse);
  rpc ListMyChatRooms(ListMyChatRoomsRequest) returns (ListMyChatRoomsResponse);
  rpc ListRoomMessages(ListRoomMessagesRequest) returns (ListRoomMessagesResponse);
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  // Streams live messages for an existing room; room participant check is required.
  rpc SubscribeRoomMessages(SubscribeRoomMessagesRequest) returns (stream ChatMessageEvent);
}

enum ChatRoomType {
  CHAT_ROOM_TYPE_UNSPECIFIED = 0;
  CHAT_ROOM_TYPE_DIRECT = 1;
}

enum ChatMessageType {
  CHAT_MESSAGE_TYPE_UNSPECIFIED = 0;
  CHAT_MESSAGE_TYPE_TEXT = 1;
}

message ChatUser {
  string user_id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
  string role = 5;
  string branch_id = 6;
}

message ChatMessage {
  string id = 1;
  string room_id = 2;
  string sender_user_id = 3;
  ChatMessageType message_type = 4;
  string body = 5;
  string metadata_json = 6;
  string created_at = 7;
}

message ChatRoom {
  string id = 1;
  ChatRoomType room_type = 2;
  string user_a_id = 3;
  string user_b_id = 4;
  string created_by_user_id = 5;
  string created_at = 6;
  string updated_at = 7;
  ChatMessage latest_message = 8;
}

message ListChatEligibleUsersRequest {
  string query = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListChatEligibleUsersResponse {
  repeated ChatUser items = 1;
}

message CreateOrGetDirectRoomRequest {
  string target_user_id = 1;
}

message CreateOrGetDirectRoomResponse {
  ChatRoom room = 1;
}

message ListMyChatRoomsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListMyChatRoomsResponse {
  repeated ChatRoom items = 1;
}

message ListRoomMessagesRequest {
  string room_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListRoomMessagesResponse {
  repeated ChatMessage items = 1;
}

message SendMessageRequest {
  string room_id = 1;
  ChatMessageType message_type = 2;
  string body = 3;
  string metadata_json = 4;
}

message SendMessageResponse {
  ChatMessage message = 1;
}

message SubscribeRoomMessagesRequest {
  string room_id = 1;
  string after_message_id = 2;
}

message ChatMessageEvent {
  oneof payload {
    ChatMessage message = 1;
    string heartbeat = 2;
  }
}
