syntax = "proto3";

package media.v1;

option go_package = "github.com/chirag3003/lms-monorepo/services/core-api/internal/transport/grpc/generated/mediav1;mediav1";

service MediaService {
  rpc InitiateMediaUpload(InitiateMediaUploadRequest) returns (InitiateMediaUploadResponse);
  rpc CompleteMediaUpload(CompleteMediaUploadRequest) returns (CompleteMediaUploadResponse);
  rpc ListMedia(ListMediaRequest) returns (ListMediaResponse);
}

message InitiateMediaUploadRequest {
  string file_name = 1;
  string content_type = 2;
  int64 size_bytes = 3;
  string note = 4;
}

message InitiateMediaUploadResponse {
  bool success = 1;
  string object_key = 2;
  string upload_url = 3;
  string upload_method = 4;
  string expires_at = 5;
}

message CompleteMediaUploadRequest {
  string object_key = 1;
  string note = 2;
  string file_name = 3;
  string content_type = 4;
  int64 size_bytes = 5;
}

message CompleteMediaUploadResponse {
  bool success = 1;
  string media_id = 2;
  string file_url = 3;
  string uploaded_at = 4;
}

message ListMediaRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message MediaItem {
  string media_id = 1;
  string file_name = 2;
  string content_type = 3;
  int64 size_bytes = 4;
  string file_url = 5;
  string note = 6;
  string uploaded_at = 7;
}

message ListMediaResponse {
  repeated MediaItem items = 1;
}
