syntax = "proto3";

package query.v1;

option go_package = "github.com/chirag3003/lms-monorepo/services/core-api/internal/transport/grpc/generated/queryv1;queryv1";

service QueryService {
  rpc CreateLoanQuery(CreateLoanQueryRequest) returns (CreateLoanQueryResponse);
  rpc GetLoanQuery(GetLoanQueryRequest) returns (GetLoanQueryResponse);
  rpc ListLoanQueries(ListLoanQueriesRequest) returns (ListLoanQueriesResponse);
  rpc UpdateLoanQueryStatus(UpdateLoanQueryStatusRequest) returns (UpdateLoanQueryStatusResponse);
}

enum LoanQueryStatus {
  LOAN_QUERY_STATUS_UNSPECIFIED = 0;
  LOAN_QUERY_STATUS_PENDING = 1;
  LOAN_QUERY_STATUS_COMPLETED = 2;
}

message LoanQuery {
  string id = 1;
  string borrower_profile_id = 2;
  string loan_product_id = 3;
  string branch_id = 4;
  string requested_amount = 5;
  int32 tenure_months = 6;
  string assigned_officer_user_id = 7;
  LoanQueryStatus status = 8;
  string created_at = 9;
  string updated_at = 10;
}

message CreateLoanQueryRequest {
  string loan_product_id = 1;
  string branch_id = 2;
  string requested_amount = 3;
  int32 tenure_months = 4;
}

message CreateLoanQueryResponse {
  LoanQuery query = 1;
}

message GetLoanQueryRequest {
  string query_id = 1;
}

message GetLoanQueryResponse {
  LoanQuery query = 1;
}

message ListLoanQueriesRequest {
  string branch_id = 1;
  LoanQueryStatus status = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListLoanQueriesResponse {
  repeated LoanQuery items = 1;
}

message UpdateLoanQueryStatusRequest {
  string query_id = 1;
  LoanQueryStatus status = 2;
}

message UpdateLoanQueryStatusResponse {
  LoanQuery query = 1;
}
