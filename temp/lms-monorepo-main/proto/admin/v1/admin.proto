syntax = "proto3";

package admin.v1;

option go_package = "github.com/chirag3003/lms-monorepo/services/core-api/internal/transport/grpc/generated/adminv1;adminv1";

service AdminService {
  rpc CreateAdminAccount(CreateAdminAccountRequest) returns (CreateAdminAccountResponse);
  rpc CreateEmployeeAccount(CreateEmployeeAccountRequest) returns (CreateEmployeeAccountResponse);
  rpc ListEmployeeAccounts(ListEmployeeAccountsRequest) returns (ListEmployeeAccountsResponse);
  rpc ListBranchOfficers(ListBranchOfficersRequest) returns (ListBranchOfficersResponse);
  rpc CreateDstAccount(CreateDstAccountRequest) returns (CreateDstAccountResponse);
  rpc UpdateDstAccount(UpdateDstAccountRequest) returns (UpdateDstAccountResponse);
  rpc CreateBankBranch(CreateBankBranchRequest) returns (CreateBankBranchResponse);
  rpc UpdateBankBranch(UpdateBankBranchRequest) returns (UpdateBankBranchResponse);
  rpc DeleteBankBranch(DeleteBankBranchRequest) returns (DeleteBankBranchResponse);
  rpc UpdateBranchDstCommission(UpdateBranchDstCommissionRequest) returns (UpdateBranchDstCommissionResponse);
  rpc UpdateEmployeeAccount(UpdateEmployeeAccountRequest) returns (UpdateEmployeeAccountResponse);
  rpc DeleteEmployeeAccount(DeleteEmployeeAccountRequest) returns (DeleteEmployeeAccountResponse);
  rpc AssignEmployeeBranch(AssignEmployeeBranchRequest) returns (AssignEmployeeBranchResponse);
}

message CreateAdminAccountRequest {
  string email = 1;
  string phone_number = 2;
  string password = 3;
}

message CreateAdminAccountResponse {
  bool success = 1;
  string user_id = 2;
  string profile_id = 3;
}

enum EmployeeType {
  EMPLOYEE_TYPE_UNSPECIFIED = 0;
  EMPLOYEE_TYPE_MANAGER = 1;
  EMPLOYEE_TYPE_OFFICER = 2;
}

message CreateEmployeeAccountRequest {
  string name = 1;
  string email = 2;
  string phone_number = 3;
  string password = 4;
  EmployeeType employee_type = 5;
  string branch_id = 6;
}

message CreateEmployeeAccountResponse {
  bool success = 1;
  string user_id = 2;
  string profile_id = 3;
  int64 employee_serial = 4;
  string employee_code = 5;
}

enum StaffRole {
  STAFF_ROLE_UNSPECIFIED = 0;
  STAFF_ROLE_ADMIN = 1;
  STAFF_ROLE_MANAGER = 2;
  STAFF_ROLE_OFFICER = 3;
}

message EmployeeAccount {
  string user_id = 1;
  string name = 2;
  string email = 3;
  string phone_number = 4;
  StaffRole role = 5;
  bool is_active = 6;
  bool is_requiring_password_change = 7;
  string branch_id = 8;
  string branch_name = 9;
  string branch_region = 10;
  string branch_city = 11;
  string created_at = 12;
  int64 employee_serial = 13;
  string employee_code = 14;
}

message ListEmployeeAccountsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListEmployeeAccountsResponse {
  repeated EmployeeAccount employees = 1;
}

message ListBranchOfficersRequest {
  string branch_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListBranchOfficersResponse {
  repeated EmployeeAccount officers = 1;
}

message CreateDstAccountRequest {
  string name = 1;
  string email = 2;
  string phone_number = 3;
  string password = 4;
}

message CreateDstAccountResponse {
  bool success = 1;
  string user_id = 2;
  string profile_id = 3;
}

message UpdateDstAccountRequest {
  string user_id = 1;
  string name = 2;
  string email = 3;
  string phone_number = 4;
  string new_password = 5;
}

message UpdateDstAccountResponse {
  bool success = 1;
}

message CreateBankBranchRequest {
  string name = 1;
  string region = 2;
  string city = 3;
}

message CreateBankBranchResponse {
  bool success = 1;
  string branch_id = 2;
}

message UpdateBankBranchRequest {
  string branch_id = 1;
  string name = 2;
  string region = 3;
  string city = 4;
}

message UpdateBankBranchResponse {
  bool success = 1;
}

message UpdateBranchDstCommissionRequest {
  string branch_id = 1;
  string dst_commission = 2;
}

message UpdateBranchDstCommissionResponse {
  bool success = 1;
}

message UpdateEmployeeAccountRequest {
  string user_id = 1;
  string email = 2;
  string phone_number = 3;
  string new_password = 4;
}

message UpdateEmployeeAccountResponse {
  bool success = 1;
}

message AssignEmployeeBranchRequest {
  string user_id = 1;
  string branch_id = 2;
  bool clear_branch = 3;
}

message AssignEmployeeBranchResponse {
  bool success = 1;
}

message DeleteBankBranchRequest {
  string branch_id = 1;
}

message DeleteBankBranchResponse {
  bool success = 1;
}

message DeleteEmployeeAccountRequest {
  string user_id = 1;
}

message DeleteEmployeeAccountResponse {
  bool success = 1;
}
