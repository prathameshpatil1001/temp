version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: lms-postgres
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d lms"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate:v4.17.1
    container_name: lms-migrate
    command: ["-path", "/migrations", "-database", "postgres://lms:lms@postgres:5432/lms?sslmode=disable", "up"]
    restart: "no"
    volumes:
      - ./services/core-api/internal/repository/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7
    container_name: lms-redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-api:
    build:
      context: ./services/core-api
      dockerfile: Dockerfile
    container_name: lms-core-api
    labels:
      - traefik.enable=true
      - traefik.docker.network=ios-lms-htagnc
      - traefik.http.routers.lmsapi.rule=Host(`lmsapi.chirag.codes`)
      - traefik.http.routers.lmsapi.entrypoints=websecure
      - traefik.http.routers.lmsapi.tls=true
      - traefik.http.routers.lmsapi.tls.certresolver=letsencrypt
      - traefik.http.routers.lmsapi.priority=1000
      - traefik.http.routers.lmsapi.service=lmsapi-svc
      - traefik.http.services.lmsapi-svc.loadbalancer.server.port=8080
      - traefik.http.services.lmsapi-svc.loadbalancer.server.scheme=h2c
    environment:
      GRPC_PORT: "8080"
      JWT_SIGNING_KEY: "dev-only-change-me"
      POSTGRES_DSN: "postgres://lms:lms@postgres:5432/lms?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      WEBAUTHN_RP_ID: "chirag.codes"
      WEBAUTHN_RP_ORIGINS: "https://lmsapi.chirag.codes"
      WEBAUTHN_RP_DISPLAY_NAME: "LMS Monorepo"
      SANDBOX_BASE_URL: "https://api.sandbox.co.in"
      SANDBOX_API_KEY: "key_live_ee94d1a8e4244a1684f2445fd7662dc8"
      SANDBOX_API_SECRET: "secret_live_c86fdc4fb3ac464c9fabcbed06503da1"
      R2_ACCOUNT_ID: "579ae5487cfcd4476a6663ccda20b80f"
      R2_ACCESS_KEY_ID: "9da1d7eebad4688d39cb8b92d5c2f692"
      R2_SECRET_ACCESS_KEY: "ca0daffd428bb437e51cead338261ca3a9cac29bc7205a09af3f0bf932df973c"
      R2_BUCKET_NAME: "lms"
      R2_PUBLIC_BASE_URL: "https://lmscdn.chirag.codes"
      RAZORPAY_KEY_ID: "rzp_test_84roUUOEPkHVpe"
      RAZORPAY_KEY_SECRET: "piqd8Coc9LsERsVSYomDb03b"
      RAZORPAY_WEBHOOK_SECRET: "secret"
      HTTP_PORT: "8081"
    ports:
      - "18080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
